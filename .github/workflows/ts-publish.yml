name: Publish to npm

# Runs on version tag pushes (e.g. v1.2.1, v2.0.0-beta.1)
on:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: ts

# Setup: add NPM_TOKEN as a repository secret (Settings → Secrets → Actions)
# The token needs publish access to the @eventconnectors scope on npm.

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
